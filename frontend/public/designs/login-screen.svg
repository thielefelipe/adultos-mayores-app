<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003D82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: bold; color: #003D82; }
      .label { font-family: 'Open Sans', sans-serif; font-size: 12px; font-weight: bold; color: #333333; }
      .input-placeholder { font-family: 'Open Sans', sans-serif; font-size: 14px; color: #999999; }
      .button-text { font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: bold; color: #FFFFFF; }
      .link-text { font-family: 'Open Sans', sans-serif; font-size: 12px; color: #0066CC; text-decoration: underline; cursor: pointer; }
    </style>
  </defs>

  <!-- Fondo Degradado -->
  <rect width="1920" height="1080" fill="url(#blueGradient)"/>

  <!-- Contenedor Formulario (Blanco, centrado) -->
  <rect x="760" y="340" width="400" height="400" rx="8" fill="#FFFFFF" filter="drop-shadow(0px 4px 12px rgba(0,0,0,0.15))"/>

  <!-- Logo Municipalidad (Esquina superior izquierda) -->
  <circle cx="80" cy="80" r="30" fill="#0066CC" opacity="0.8"/>
  <text x="80" y="85" text-anchor="middle" class="title" font-size="20">MC</text>
  <text x="80" y="120" text-anchor="middle" font-family="Open Sans" font-size="10" color="#0066CC">Coelemu</text>

  <!-- Título del Formulario -->
  <text x="960" y="380" text-anchor="middle" class="title">Iniciar Sesión</text>

  <!-- Label Usuario -->
  <text x="780" y="440" class="label">Usuario</text>

  <!-- Input Usuario -->
  <rect x="760" y="450" width="400" height="40" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="780" y="475" class="input-placeholder">Ingrese su usuario</text>

  <!-- Label Contraseña -->
  <text x="780" y="530" class="label">Contraseña</text>

  <!-- Input Contraseña -->
  <rect x="760" y="540" width="400" height="40" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="780" y="565" class="input-placeholder">Ingrese su contraseña</text>

  <!-- Botón Iniciar Sesión -->
  <rect x="760" y="610" width="400" height="48" rx="8" fill="#0066CC" filter="drop-shadow(0px 2px 8px rgba(0,0,0,0.1))"/>
  <text x="960" y="640" text-anchor="middle" class="button-text">Iniciar Sesión</text>

  <!-- Link Contraseña Olvidada -->
  <text x="960" y="680" text-anchor="middle" class="link-text">¿Olvidaste tu contraseña?</text>

  <!-- Pie de página -->
  <text x="960" y="1050" text-anchor="middle" font-family="Open Sans" font-size="12" color="#FFFFFF" opacity="0.7">Municipalidad de Coelemu © 2026</text>
</svg>
