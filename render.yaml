services:
  - type: web
    name: adultos-mayores-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        value: dpg-d7ltnllckfvc739crllg-a
      - key: DB_PORT
        value: 5432
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        value: 5ZR21MkYYQN1ad8gqtqPJvVmpQAHydLa
      - key: DB_NAME
        value: centros_diurnos_db
      - key: JWT_SECRET
        value: demo-secret-key-change-in-production
      - key: JWT_EXPIRE
        value: 24h
      - key: ENCRYPTION_KEY
        value: your_32_character_encryption_key_here
      - key: CORS_ORIGIN
        value: https://adultos-mayores-frontend.onrender.com

  - type: static_site
    name: adultos-mayores-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    envVars:
      - key: VITE_API_URL
        value: https://adultos-mayores-backend.onrender.com/api
    staticPublishPath: frontend/dist
