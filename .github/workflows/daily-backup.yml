name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install PostgreSQL client
        run: |
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 --no-install-recommends

      - name: Create Backup
        env:
          DB_URL: ${{ secrets.RENDER_DB_URL }}
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump $DB_URL > backups/backup_prod_${TIMESTAMP}.sql
          echo "✅ Backup created: backup_prod_${TIMESTAMP}.sql"
          ls -lh backups/

      - name: Push Backup to GitHub
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git commit -m "🔄 Backup automático $(date +%Y-%m-%d)" || true
          git push

      - name: Keep only last 30 backups
        run: |
          cd backups
          ls -t backup_prod_*.sql 2>/dev/null | tail -n +31 | xargs -r rm
          git add backups/ && git commit -m "🗑️ Cleanup old backups" || true
          git push || true